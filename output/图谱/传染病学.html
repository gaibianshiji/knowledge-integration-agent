#ec4899", "size": 8}, {"id": "book_06_传染病学_node_084", "name": "艾滋病", "category": "核心概念", "definition": "获得性免疫缺陷综合征，由HIV感染引起的以CD4+ T淋巴细胞进行性减少为特征的严重免疫缺陷病，最终导致各种机会性感染和肿瘤。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_085", "name": "HIV免疫病理机制", "category": "病理变化", "definition": "HIV主要通过直接杀伤和间接免疫损伤（如炎症因子释放、免疫系统杀伤）导致CD4+ T淋巴细胞数量减少和功能障碍，并引起胸腺萎缩。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_086", "name": "艾滋病病理特点", "category": "病理变化", "definition": "组织炎症反应少，机会性感染病原体多。病变主要在淋巴结和胸腺等免疫器官，可出现反应性增生或肿瘤性病变（如卡波西肉瘤、淋巴瘤）。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_087", "name": "艾滋病潜伏期", "category": "临床表现", "definition": "从初始感染HIV到终末期的时间，平均为8～9年，可短至数月，长达15年。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_088", "name": "急性期", "category": "临床表现", "definition": "初次感染HIV后6个月内，出现病毒血症和免疫系统急性损伤症状，以发热最常见，持续1-3周缓解。此期可检出HIV RNA和p24抗原，抗体尚未出现。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_089", "name": "无症状期", "category": "临床表现", "definition": "可从急性期进入或直接进入，持续时间4-8年。HIV在体内不断复制，具有传染性，CD4+ T淋巴细胞计数逐渐下降。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_090", "name": "艾滋病期", "category": "临床表现", "definition": "感染HIV后的终末期，CD4+ T淋巴细胞计数明显下降（多<200个/μL），病毒载量升高。主要表现为HIV相关症状、机会性感染和肿瘤。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_094", "name": "耶氏肺孢子菌肺炎", "category": "临床表现", "definition": "艾滋病期最常见的呼吸系统机会性感染，表现为发热、干咳、血氧分压降低，胸部X线显示弥漫性网状结节样间质浸润。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_096", "name": "典型麻疹", "category": "临床表现", "definition": "最常见的麻疹类型，具有发热、上呼吸道卡他症状、麻疹黏膜斑和典型皮疹等完整临床表现。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_098", "name": "重型麻疹", "category": "临床表现", "definition": "多见于免疫功能低下或继发感染者，病死率高，包括中毒性、休克性、出血性和疱疹性麻疹。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_099", "name": "异型麻疹", "category": "临床表现", "definition": "见于接种灭活疫苗后再次接触麻疹患者，表现为高热、多形性皮疹从四肢开始，无传染性，血凝抑制抗体高滴度。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_100", "name": "麻疹实验室检查", "category": "治疗方法", "definition": "包括血常规、血清学抗体检测、病毒分离、抗原检测和核酸检测，用于确诊和鉴别诊断。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_101", "name": "血清学抗体检测", "category": "治疗方法", "definition": "ELISA或化学发光法检测血清麻疹特异性IgM和IgG抗体，IgM阳性或IgG恢复期4倍升高可确诊。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_102", "name": "病毒核酸检测", "category": "治疗方法", "definition": "采用RT-PCR从临床标本中扩增麻疹病毒RNA，阳性即可确诊，尤其适用于免疫功能低下患者。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_104", "name": "麻疹肺炎", "category": "病理变化", "definition": "麻疹最常见的并发症和死亡原因，多由继发细菌感染引起，表现为病情突然加重，可合并心力衰竭。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_105", "name": "麻疹喉炎", "category": "病理变化", "definition": "多见于3岁以下小儿，表现为声音嘶哑、犬吠样咳嗽，严重时可致喉窒息，需气管切开。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.8, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_106", "name": "麻疹心肌炎", "category": "病理变化", "definition": "多见于2岁以下重型麻疹、并发肺炎及营养不良患儿，表现为精神萎靡等。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.8, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_107", "name": "慢性HBV感染", "category": "核心概念", "definition": "血清HBsAg和HBV DNA阳性，HBeAg阳性或阴性，1年内连续随访3次以上ALT和AST正常，肝组织学无明显异常或轻度异常。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_108", "name": "HBeAg阳性慢性HBV感染者", "category": "核心概念", "definition": "血清HBsAg和HBV DNA阳性，HBeAg阳性，1年内连续随访3次以上ALT和AST正常，肝组织学一般无明显异常或轻度异常。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_109", "name": "HBeAg阴性慢性HBV携带者", "category": "核心概念", "definition": "血清HBsAg低滴度阳性，HBeAg阴性，抗-HBe阳性或阴性，HBV DNA检测不到，1年内连续随访3次以上ALT正常，肝组织学无或仅有轻度炎症。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_110", "name": "隐匿性慢性乙型肝炎", "category": "核心概念", "definition": "血清HBsAg阴性，但血清和/或肝组织中HBV DNA阳性，有慢性乙型肝炎临床表现，可伴有抗-HBs、抗-HBe和/或抗-HBc阳性。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_111", "name": "丙型肝炎诊断", "category": "临床表现", "definition": "抗-HCV IgM和/或IgG阳性，HCV RNA阳性，可诊断为丙型肝炎。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_112", "name": "丁型肝炎诊断", "category": "临床表现", "definition": "有现症HBV感染，同时血清HDAg或抗-HD IgM或高滴度抗-HD IgG或HDV RNA阳性，或肝内HDAg或HDV RNA阳性。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_113", "name": "戊型肝炎诊断", "category": "临床表现", "definition": "急性肝炎患者抗-HEV IgM阳性，或抗-HEV IgG由阴性转为阳性或滴度变化，或血/粪便HEV RNA阳性，或检出HEV颗粒。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_114", "name": "慢性戊型肝炎", "category": "临床表现", "definition": "免疫抑制患者出现ALT异常，且血清和/或粪便HEV RNA持续阳性3个月以上。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_115", "name": "溶血性黄疸", "category": "病理变化", "definition": "常有药物或感染等诱因，表现为贫血、血红蛋白尿、网织红细胞升高，黄疸较轻，主要为间接胆红素升高。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_116", "name": "肝外梗阻性黄疸", "category": "病理变化", "definition": "常见病因有胆囊炎、壶腹周围癌等，有原发病症状，肝功能损害轻，以直接胆红素为主，肝内外胆管扩张。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_117", "name": "其他原因引起的肝炎", "category": "核心概念", "definition": "包括其他病毒所致的肝炎、感染中毒性肝炎、药物性肝损害、酒精性肝病、自身免疫性肝炎、脂肪肝及妊娠急性脂肪肝、肝豆状核变性等。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_118", "name": "自身免疫性肝炎", "category": "病理变化", "definition": "包括原发性胆汁性肝硬化（PBC）和自身免疫性肝病，PBC主要累及肝内胆管，自身免疫性肝病主要破坏肝细胞，诊断依靠自身抗体和病理组织。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_119", "name": "肝豆状核变性", "category": "病理变化", "definition": "血清铜及铜蓝蛋白降低，眼角膜边缘可发现凯-弗环（Kayser-Fleischer ring）。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_121", "name": "卫氏并殖吸虫病", "category": "核心概念", "definition": "由卫氏并殖吸虫感染引起，主要累及肺部，表现为咳嗽、咯血、胸痛等呼吸道症状，痰中可查见虫卵。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_122", "name": "斯氏狸殖吸虫病", "category": "核心概念", "definition": "由斯氏狸殖吸虫感染引起，以游走性皮下结节为主要特点，常侵犯肝脏，痰中虫卵少见。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_123", "name": "胸肺型并殖吸虫病", "category": "临床表现", "definition": "最常见的临床类型，主要由卫氏并殖吸虫感染所致，表现为咳嗽、胸痛、气短，痰呈铁锈色或烂桃样，可查见虫卵及夏科-莱登结晶。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_124", "name": "腹型并殖吸虫病", "category": "临床表现", "definition": "约占30%，多见于感染早期，表现为腹痛、腹泻、呕吐，可扪及腹部结节与肿块，虫体侵犯肝脏可形成嗜酸性肝脓肿。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_125", "name": "皮肤型并殖吸虫病", "category": "临床表现", "definition": "以皮下结节或包块为主要表现，卫氏型结节不游走，斯氏型结节游走性明显，活检可见童虫。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_126", "name": "脑脊髓型并殖吸虫病", "category": "临床表现", "definition": "多见于儿童卫氏并殖吸虫病，表现为颅内压增高、癫痫发作、肢体感觉异常，斯氏狸殖吸虫病可致蛛网膜下隙出血。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_128", "name": "慢性并殖吸虫病", "category": "临床表现", "definition": "早期症状不明显，发现时已为慢性期，按侵犯主要器官分为胸肺型、腹型、皮肤型、脑脊髓型等。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_129", "name": "痰液检查", "category": "治疗方法", "definition": "卫氏并殖吸虫病患者清晨痰涂片或经氢氧化钾消化后镜检可见虫卵及夏科-莱登结晶，24小时痰液收集可提高检出率。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_130", "name": "粪便检查", "category": "治疗方法", "definition": "15%-40%患者的粪便中可查见并殖吸虫虫卵，用于辅助诊断。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_131", "name": "嗜酸性粒细胞增高", "category": "病理变化", "definition": "急性患者外周血嗜酸性粒细胞比例明显增高（可达30%-40%），腹水及痰中嗜酸性粒细胞也可增高，红细胞沉降率增快。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_133", "name": "并殖吸虫虫卵", "category": "微生物", "definition": "并殖吸虫的虫卵，可在痰、粪便、脑脊液等体液中查见，是确诊并殖吸虫病的重要病原学依据。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_135", "name": "夏科-莱登结晶", "category": "病理变化", "definition": "在并殖吸虫病患者的痰液或体液中可能出现的菱形结晶，与嗜酸性粒细胞增多相关，是辅助诊断线索。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_136", "name": "ELISA检测", "category": "治疗方法", "definition": "酶联免疫吸附试验，用于检测血清或脑脊液中的并殖吸虫特异性抗体，敏感性高（>90%），是重要的免疫学诊断方法。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_137", "name": "皮内试验", "category": "治疗方法", "definition": "将并殖吸虫成虫抗原注射于前臂皮内，观察皮丘大小，阳性率可达95%，常用于现场流行病学调查，但存在交叉反应和治愈后持续阳性问题。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_138", "name": "影像学检查", "category": "临床表现", "definition": "包括X线胸片、CT、MRI和PET/CT等，可显示肺部炎性浸润影、囊肿、胸腔积液及胸膜增厚等病变，对胸肺型并殖吸虫病有重要参考价值。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_139", "name": "肺部并殖吸虫病", "category": "临床表现", "definition": "并殖吸虫病最常见的类型，主要累及肺部，表现为咳嗽、咳铁锈色痰、胸痛等，影像学可见中下肺野病变。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_140", "name": "脑并殖吸虫病", "category": "临床表现", "definition": "并殖吸虫侵犯脑部引起的病变，表现为头痛、癫痫发作等，影像学可发现脑内包囊，需与颅内肿瘤等鉴别。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_141", "name": "皮下结节或包块", "category": "临床表现", "definition": "并殖吸虫（尤其是斯氏狸殖吸虫）引起的游走性皮下结节或包块，病理检查可见虫卵、童虫或成虫，是确诊依据之一。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_143", "name": "鉴别诊断", "category": "核心概念", "definition": "并殖吸虫病临床表现复杂，需与肺结核、结核性胸膜炎、Löffler综合征、球孢子菌病、颅内肿瘤、原发性癫痫等多种疾病进行鉴别。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_144", "name": "甲型肝炎预后", "category": "临床表现", "definition": "甲型肝炎预后良好，多数患者在3个月内临床康复，病死率约为0.01%。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_145", "name": "乙型肝炎转归", "category": "病理变化", "definition": "急性乙型肝炎60%～90%可完全康复，10%～40%转为慢性或病毒携带。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": ", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_155", "name": "抗病毒治疗目标", "category": "治疗方法", "definition": "乙型肝炎：最大限度抑制病毒，延缓疾病进展；丙型肝炎：清除HCV，阻止进展为肝硬化、肝衰竭或HCC。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_156", "name": "抗病毒治疗适应证", "category": "治疗方法", "definition": "血清HBV DNA阳性、ALT持续异常且排除其他原因所致者，应进行抗病毒治疗。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_158", "name": "感染过程的表现", "category": "核心概念", "definition": "病原体侵入人体后，根据病原体与宿主相互作用的结果，呈现的不同临床表现类型，如隐性感染、显性感染等。", "chapter": "第一节 感染与免疫", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_159", "name": "病原体的作用", "category": "病理变化", "definition": "病原体在感染过程中通过侵袭力、毒力、数量及变异性等因素对宿主造成损害的能力。", "chapter": "第一节 感染与免疫", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_160", "name": "免疫应答的作用", "category": "生理机制", "definition": "宿主免疫系统针对病原体产生的保护性免疫反应，包括非特异性免疫和特异性免疫，对感染结局起关键作用。", "chapter": "第一节 感染与免疫", "textbook": "传染病学", "confidence": 0.93, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_161", "name": "传染病的发生与发展", "category": "病理变化", "definition": "传染病从病原体入侵到疾病发生、发展的动态过程，包括潜伏期、前驱期、症状明显期和恢复期等阶段。", "chapter": "第二节 传染病的发病机制", "textbook": "传染病学", "confidence": 0.96, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_162", "name": "组织损伤的发生机制", "category": "病理变化", "definition": "病原体及其毒素直接损伤宿主组织细胞，或通过免疫病理反应间接导致组织损伤的机制。", "chapter": "第二节 传染病的发病机制", "textbook": "传染病学", "confidence": 0.94, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_163", "name": "重要的病理生理变化", "category": "病理变化", "definition": "传染病过程中出现的全身性病理生理改变，如发热、炎症、代谢紊乱、器官功能障碍等。", "chapter": "第二节 传染病的发病机制", "textbook": "传染病学", "confidence": 0.91, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_164", "name": "流行过程的基本条件", "category": "核心概念", "definition": "传染病在人群中传播所必需的三个环节：传染源、传播途径和易感人群。", "chapter": "第三节 传染病的流行过程及影响因素", "textbook": "传染病学", "confidence": 0.97, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_165", "name": "影响流行过程的因素", "category": "核心概念", "definition": "影响传染病流行过程发生、发展和结局的自然因素和社会因素，如气候、地理、人口流动、卫生条件等。", "chapter": "第三节 传染病的流行过程及影响因素", "textbook": "传染病学", "confidence": 0.93, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_166", "name": "HIV感染诊断标准", "category": "核心概念", "definition": "根据年龄、流行病学史、实验室检测（HIV核酸检测、HIV分离试验、抗体检测）等综合判断HIV感染状态的标准。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_167", "name": "HIV感染早期", "category": "病理变化", "definition": "HIV感染后3-6个月内，可伴有急性HIV感染临床表现或持续性全身性淋巴腺病，抗体筛查试验无反应但核酸检测阳性。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_168", "name": "HIV感染中期", "category": "病理变化", "definition": "CD4+ T淋巴细胞计数为200-500个/μL，通常无症状或符合无症状期相关临床表现。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_170", "name": "CD4+ T淋巴细胞计数", "category": "生理机制", "definition": "衡量HIV感染者免疫状态的关键指标，用于分期诊断和预后评估。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_172", "name": "HIV核酸检测", "category": "治疗方法", "definition": "直接检测病毒核酸，用于早期诊断（尤其18月龄以下儿童）和确认感染。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_174", "name": "原发性CD4+ T淋巴细胞减少症", "category": "病理变化", "definition": "一种与艾滋病临床表现相似但无HIV感染的疾病，需通过HIV病原学检测鉴别。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_175", "name": "继发性CD4+ T淋巴细胞减少", "category": "病理变化", "definition": "由肿瘤、自身免疫性疾病或免疫抑制治疗导致的CD4+ T细胞减少，需与HIV感染鉴别。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_176", "name": "HIV感染/艾滋病慢性病管理", "category": "治疗方法", "definition": "将HIV感染视为可治疗但无法治愈的慢性病，关注合并症和并发症管理，提高生存质量。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_177", "name": "儿童艾滋病指征性疾病", "category": "临床表现", "definition": "用于诊断15岁以下儿童艾滋病期的特定疾病，如严重细菌感染、肺孢子菌肺炎等。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_180", "name": "口腔麻疹黏膜斑（Koplik斑）", "category": "临床表现", "definition": "麻疹前驱期特征性体征，出现在口腔黏膜的灰白色小点，是临床诊断麻疹的重要依据。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_182", "name": "麻疹脑炎", "category": "病理变化", "definition": "麻疹的急性并发症，由麻疹病毒直接损伤脑组织所致，发病率0.01%-0.50%，病死率约15%，部分患者留有后遗症。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.94, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_183", "name": "亚急性硬化性全脑炎（SSPE）", "category": "病理变化", "definition": "麻疹的远期并发症，潜伏期2-17年，平均7年，表现为进行性智力障碍、运动不协调、癫痫等，最终昏迷死亡。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.93, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_184", "name": "麻疹诊断", "category": "治疗方法", "definition": "典型麻疹根据流行病学史和临床表现（发热、卡他症状、Koplik斑、皮疹）可临床诊断，确诊需病原学检查阳性。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_185", "name": "麻疹鉴别诊断", "category": "治疗方法", "definition": "麻疹需与风疹、幼儿急疹、猩红热、药物疹等其他出疹性疾病相鉴别，主要依据发热与皮疹关系、皮疹特点及伴随症状。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_186", "name": "风疹", "category": "临床表现", "definition": "一种出疹性疾病，前驱期短，全身症状轻，无Koplik斑，发热1-2天出疹，皮疹以躯干为主，1-2天消退，伴颈部淋巴结肿大。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_187", "name": "幼儿急疹", "category": "临床表现", "definition": "一种出疹性疾病，突起高热3-5天，热骤降后出疹，皮疹散在分布于躯干，1-3天退尽，特点为热退疹出。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_188", "name": "猩红热", "category": "临床表现", "definition": "一种出疹性疾病，发热1-2天全身出现针尖大小红色丘疹，疹间皮肤充血，面部无皮疹，口周苍白圈，疹退后大片脱皮，白细胞增高。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_189", "name": "药物疹", "category": "临床表现", "definition": "由药物过敏引起的皮疹，有近期服药史，皮疹多形性，低热或不发热，无Koplik斑及卡他症状，停药后消退，嗜酸性粒细胞可增多。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.91, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_190", "name": "麻疹治疗", "category": "治疗方法", "definition": "麻疹为自限性疾病，无特效药物，主要采取对症治疗、预防和治疗并发症，重型麻疹病死率较高。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_191", "name": "乙型肝炎肝硬化抗病毒治疗指征", "category": "治疗方法", "definition": "代偿期和失代偿期乙型肝炎肝硬化患者，无论ALT和HBV DNA水平高低及HBeAg是否阳性，均应进行抗病毒治疗。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_192", "name": "HBV DNA阳性患者抗病毒治疗条件", "category": "治疗方法", "definition": "血清HBV DNA阳性者，无论ALT水平高低，符合以下任一情况：有乙型肝炎肝硬化或HCC家族史、年龄>30岁、肝脏明显炎症、HBV相关肝外表现，应抗病毒治疗。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_193", "name": "抗病毒治疗疗效判断", "category": "核心概念", "definition": "包括病毒学应答（HBV DNA检测不到或下降≥2lg）、血清学应答（HBeAg/HBsAg转阴或血清学转换）、生化学应答（ALT和AST恢复）、组织学应答（肝脏炎症坏死或纤维化改善）。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_194", "name": "持续病毒学应答", "category": "核心概念", "definition": "治疗结束后12周时获得持续病毒学应答，即检测方法无法检出HCV RNA（<15IU/ml），相当于临床治愈。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_195", "name": "核苷类似物", "category": "治疗方法", "definition": "直接靶向HBV的DNA聚合酶，抑制病毒复制，耐受性好。包括拉米夫定、阿德福韦酯、替比夫定、恩替卡韦、替诺福韦和丙酚替诺福韦。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_196", "name": "聚乙二醇干扰素-α", "category": "治疗方法", "definition": "兼具抗病毒与免疫调节作用，疗程为48-96周，对HBsAg抑制较强。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_197", "name": "恩替卡韦", "category": "治疗方法", "definition": "环戊酰鸟苷类似物，成人0.5mg/日有效抑制HBV DNA复制；对YMDD变异者剂量提高至1mg/日，属一线用药。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_198", "name": "替诺福韦", "category": "治疗方法", "definition": "核苷酸类似物，每天300mg，与拉米夫定等无交叉耐药，可用于初始治疗或挽救治疗，肾毒性较小，妊娠安全性B类。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_199", "name": "丙酚替诺福韦", "category": "治疗方法", "definition": "替诺福韦新型前体药物，血浆稳定性更高，靶向肝脏，每天25mg，骨肾安全性更佳，ALT复常率更高，属一线用药。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_200", "name": "乙型肝炎患者停药指征", "category": "治疗方法", "definition": "HBeAg阳性患者需长期用药至HBsAg消失；HBeAg阴性患者治疗至HBsAg消失和/或出现抗-HBs，且HBV DNA检测不到，巩固6个月可停药。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_201", "name": "YMDD变异", "category": "病理变化", "definition": "酪氨酸-蛋氨酸-天门冬氨酸-天门冬氨酸变异，与核苷类似物耐药相关，恩替卡韦需提高剂量应对。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_203", "name": "华支睾吸虫病", "category": "核心概念", "definition": "由华支睾吸虫寄生在人体肝内胆管引起的寄生虫病，俗称肝吸虫病，可导致胆管炎、肝硬化，甚至胆管癌。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_204", "name": "吡喹酮", "category": "治疗方法", "definition": "治疗并殖吸虫病的首选药物，对肺部感染治愈率接近100%，分3次服用，连用3天，脑型患者可重复疗程。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_205", "name": "三氯苯哒唑", "category": "治疗方法", "definition": "一种新的苯并咪唑类衍生物，对并殖吸虫有明显杀灭作用，疗效与吡喹酮相似，不良反应轻微，但可能延长QTc间期。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_206", "name": "并殖吸虫病的鉴别诊断", "category": "临床表现", "definition": "需与细菌性脑膜炎、阿米巴性脑膜脑炎、类圆线虫病、嗜酸性粒细胞增多性脑膜炎、肝脓肿、病毒性肝炎等疾病相鉴别。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_207", "name": "并殖吸虫病的并发症与预后", "category": "病理变化", "definition": "预后因虫种、感染程度及病变部位而异，一般较好；脑型可致残或死于脑疝，斯氏狸殖吸虫侵犯脑组织较卫氏并殖吸虫轻。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_208", "name": "并殖吸虫病的对症治疗", "category": "治疗方法", "definition": "包括颅内高压使用脱水剂、胸痛镇咳、癫痫发作使用苯妥英钠或地西泮、脑脊髓型压迫症状可手术、皮下包块切除、胸膜剥离术等。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_209", "name": "并殖吸虫病的健康教育", "category": "治疗方法", "definition": "控制流行的措施包括彻底治疗患者和病犬、捕杀有害动物、不生食溪蟹和蝲蛄、不饮生溪水、加强粪便和水源管理。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_210", "name": "华支睾吸虫的形态特征", "category": "微生物", "definition": "虫体形似葵花子仁，有口腹两个吸盘，雄性生殖器官有1对分支状睾丸，雌性有1个分叶状卵巢，虫卵是寄生人体最小的蠕虫卵，形似灯泡状。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_211", "name": "华支睾吸虫的生活史", "category": "生理机制", "definition": "成虫寄生于肝内胆管，产卵后随胆汁进入肠道排出体外，虫卵入水后被第一中间宿主螺类吞食，在螺体内孵出毛蚴。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_212", "name": "华支睾吸虫病的临床表现", "category": "临床表现", "definition": "临床特征为精神不振、肝大，重者可导致肝硬化，感染严重的儿童常有营养不良和发育障碍，与胆管癌明确相关。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_215", "name": "呼吸道隔离", "category": "治疗方法", "definition": "对麻疹 idence": 0.94, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_498", "name": "病毒灭活条件", "category": "生理机制", "definition": "脊髓灰质炎病毒在56℃加热30分钟以上、紫外线照射1小时、含氯0.05mg/L水中10分钟、甲醛、2%碘酊、过氧化氢等条件下可被灭活。", "chapter": "第二节 肠道病毒感染", "textbook": "传染病学", "confidence": 0.93, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_499", "name": "血清型与交叉免疫", "category": "生理机制", "definition": "脊髓灰质炎病毒分为Ⅰ、Ⅱ、Ⅲ三个血清型，各型间很少交叉免疫，感染后获得型特异性持久免疫。", "chapter": "第二节 肠道病毒感染", "textbook": "传染病学", "confidence": 0.96, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_501", "name": "减毒活疫苗", "category": "治疗方法", "definition": "口服的脊髓灰质炎减毒活疫苗，可有效降低发病率，但疫苗病毒排出后可能恢复毒力感染他人。", "chapter": "第二节 肠道病毒感染", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_502", "name": "无脊髓灰质炎区域", "category": "核心概念", "definition": "世界卫生组织于2000年10月宣布西太平洋地区（包括中国）成为无脊髓灰质炎区域，但部分地区因接种率低仍有发病。", "chapter": "第二节 肠道病毒感染", "textbook": "传染病学", "confidence": 0.92, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_505", "name": "水痘发病机制", "category": "病理变化", "definition": "病毒经上呼吸道侵入，在呼吸道黏膜细胞增殖后入血形成病毒血症，经两次病毒血症后引起皮肤等器官病变，皮疹分批出现与病毒间歇性入血有关。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_506", "name": "水痘病理特征", "category": "病理变化", "definition": "皮肤表皮棘细胞层病变，细胞肿胀伴气球样变性，组织液渗入形成疱疹，可见多核巨细胞和嗜酸性包涵体。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_507", "name": "水痘潜伏期", "category": "临床表现", "definition": "从感染到发病的时间，水痘潜伏期为10-21天，以14-16天多见。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_508", "name": "水痘前驱期", "category": "临床表现", "definition": "出疹前阶段，患者出现畏寒、食欲缺乏等感染中毒症状，婴幼儿多无症状或仅有低热、易激惹。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.88, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_509", "name": "水痘皮疹特点", "category": "临床表现", "definition": "向心性分布，先见于躯干后延及面部，皮疹分批出现，同一部位可见斑丘疹、疱疹和结痂同时存在，为本病特征。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_510", "name": "水痘疱疹演变过程", "category": "临床表现", "definition": "初为红色斑疹，数小时后变为丘疹并发展成疱疹，疱液先透明后变浊，1-2天后干枯结痂，1周左右脱落，一般不留瘢痕。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.93, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_511", "name": "水痘自限性", "category": "临床表现", "definition": "水痘多为自限性疾病，10天左右可自愈，儿童症状较轻，成人较重易并发水痘肺炎。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_512", "name": "水痘并发症", "category": "临床表现", "definition": "包括水痘肺炎（成人多见）、播散性水痘（免疫功能低下者）、出血型水痘（血小板减少或DIC所致）、坏疽型水痘（继发细菌感染）。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_513", "name": "水痘免疫", "category": "生理机制", "definition": "感染后机体产生特异性细胞免疫和体液免疫，病毒血症消失，痊愈后可获得持久免疫，但病毒可潜伏导致带状疱疹。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.91, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_515", "name": "钩虫生活史", "category": "核心概念", "definition": "钩虫从幼虫经皮肤或口腔侵入人体，在小肠发育为成虫，产卵后经粪便排出，再发育为感染期幼虫的完整生命周期。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_517", "name": "钩虫流行病学特征", "category": "核心概念", "definition": "钩虫感染遍及全球，热带和亚热带地区高发，农村感染率高于城市，农民、矿工等接触土壤人群易感，可重复感染。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_518", "name": "钩虫幼虫引起的皮炎", "category": "病理变化", "definition": "丝状蚴侵入皮肤后数分钟至1小时，局部出现红色丘疹，伴水肿和炎症反应，俗称“粪毒”，3-4天消退。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_519", "name": "钩虫幼虫肺部移行", "category": "病理变化", "definition": "钩虫幼虫经淋巴管或微血管到达肺部，穿过肺泡引起点状出血和炎症，严重时可致支气管肺炎，出现咳嗽、哮喘。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_520", "name": "钩虫成虫肠道寄生与吸血", "category": "病理变化", "definition": "成虫口囊咬附在小肠黏膜，摄取血液和黏膜上皮，并分泌抗凝血物质，导致黏膜持续渗血，是慢性失血的主要原因。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_521", "name": "钩虫病贫血", "category": "临床表现", "definition": "由钩虫慢性失血引起，长期小量失血消耗体内铁质，导致低色素性小红细胞贫血，严重者可致心肌脂肪变性等。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_522", "name": "钩虫病临床表现", "category": "临床表现", "definition": "轻度感染多无症状，较重者出现钩蚴性皮炎、呼吸道症状（咳嗽、咳痰）及贫血相关表现，儿童可致生长发育障碍。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_523", "name": "钩虫成虫寿命", "category": "核心概念", "definition": "钩虫成虫寿命可长达5-7年，但大多数在1-2年内被排出体外，影响持续感染和传播。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.85, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_524", "name": "钩虫病的传染源", "category": "核心概念", "definition": "钩虫感染者与钩虫病患者是主要传染源，其粪便排出大量虫卵，污染土壤和农作物。", "chapter": "第九章  蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_525", "name": "发热伴血小板减少综合征（SFTS）", "category": "核心概念", "definition": "一种由新型布尼亚病毒引起的急性传染病，以发热、血小板减少、白细胞减少为主要特征，可累及多器官。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_526", "name": "SFTS病毒载量", "category": "病理变化", "definition": "患者体内SFTS病毒的数量，与疾病严重程度和预后密切相关。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_527", "name": "细胞因子表达模式", "category": "生理机制", "definition": "SFTS患者体内多种细胞因子（如IL-8、MCP-1、MIP-1β等）的浓度变化模式，与病毒载量和病情严重程度相关。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_528", "name": "淋巴结炎症坏死", "category": "病理变化", "definition": "SFTS死亡患者尸检发现的特征性病理改变，表现为淋巴 ze": 8}, {"id": "book_06_传染病学_node_1372", "name": "混合型囊尾蚴病", "category": "临床表现", "definition": "脑实质型、脑室型、蛛网膜型混合存在，其中脑实质型和脑室型混合症状最重。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1375", "name": "活瓣综合征（Brun征）", "category": "病理变化", "definition": "脑室型囊尾蚴病患者急转头部时，囊尾蚴悬于室壁阻塞脑室孔，突发眩晕、呕吐或循环呼吸障碍，可致猝死或小脑扁桃体疝。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_1376", "name": "囊尾蚴病血清学诊断", "category": "治疗方法", "definition": "采用猪囊尾蚴液抗原进行皮内试验、IHA、ELISA等检测，短程特异性IgG4抗体敏感性和特异性较高，但存在假阳性和与棘球蚴病的交叉反应。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1377", "name": "囊尾蚴病影像学诊断", "category": "治疗方法", "definition": "头颅CT及MRI对脑囊尾蚴病的诊断与定位具有重要价值，CT能显示直径＜1cm的病灶。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1378", "name": "囊尾蚴病疗效考核指标", "category": "治疗方法", "definition": "囊尾蚴循环抗原（Cag）和短程抗体IgG4可作为疗效考核指标，而常规ELISA抗体检测因抗体持续数年不可作为疗效考核指标。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1379", "name": "猪带绦虫病合并诊断", "category": "治疗方法", "definition": "合并猪带绦虫病的囊尾蚴病患者，粪便检查可找到虫卵或节片，是诊断的重要辅助手段。", "chapter": "第九章 蠕虫病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1381", "name": "轮状病毒", "category": "微生物", "definition": "属于呼肠病毒科的双股RNA病毒，直径70-75nm，有双层衣壳，呈放射状排列似车轮，是引起病毒性腹泻最常见的病原体之一。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_1382", "name": "诺如病毒", "category": "微生物", "definition": "属于嵌杯病毒科的无包膜单链RNA病毒，直径27-30nm，易变异，是引起暴发性胃肠炎的主要病原体，GⅡ4型感染常见。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_1383", "name": "轮状病毒结构蛋白", "category": "解剖结构", "definition": "轮状病毒编码 ition": "病程第1-3天，起病急，体温迅速上升至39-40℃，伴有精神萎靡、头痛、腹泻等，神经系统症状不明显。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1393", "name": "极期", "category": "临床表现", "definition": "病程第4-10天，突出表现为脑实质受损症状，包括高热、意识障碍、惊厥或抽搐、呼吸衰竭等。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1394", "name": "高热", "category": "临床表现", "definition": "乙脑极期体温常高达40℃，一般持续7-10天，重型可达3周以上，发热越高病情越重。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.94, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1395", "name": "意识障碍", "category": "临床表现", "definition": "乙脑极期常见表现，包括嗜睡、定向力障碍、昏迷等，昏迷深浅和持续时间与病情严重程度及预后正相关。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1396", "name": "惊厥或抽搐", "category": "临床表现", "definition": "乙脑极期发生率40%-60%，由高热、脑实质炎症及脑水肿所致，表现为面部小抽搐至全身强直性抽搐，伴意识障碍。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1397", "name": "呼吸衰竭", "category": "临床表现", "definition": "乙脑极期严重表现，主要为中枢性呼吸衰竭，由脑实质炎症、脑疝等引起，表现为呼吸节律不规则，是主要死亡原因。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1398", "name": "脑疝", "category": "病理变化", "definition": "乙脑极期严重并发症，包括小脑幕切迹疝和枕骨大孔疝，导致瞳孔变化、肢体瘫痪、生命体征异常，可突发呼吸骤停。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.93, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_1401", "name": "轻型乙脑", "category": "临床表现", "definition": "体温39℃以下，轻度嗜睡，头痛呕吐不严重，约1周恢复，无明显神经系统症状。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1402", "name": "普通型乙脑", "category": "临床表现", "definition": "体温39-40℃，意识障碍如昏睡或浅昏迷，脑膜刺激征明显，病程7-14天，多无恢复期症状。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#ef4444", "size": 8}, { gory": "治疗方法", "definition": "根据病情给予流质、半流质软食等，进食困难者采用鼻饲或静脉补给营养品", "chapter": "第六节 传染病的治疗", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1541", "name": "液体及盐类补充", "category": "治疗方法", "definition": "对发热、吐泻患者补充液体和盐类，维持水、电解质和酸碱平衡", "chapter": "第六节 传染病的治疗", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_1542", "name": "棘球蚴病", "category": "核心概念", "definition": "由棘球绦虫的蚴虫感染人体所致的寄生虫病，主要分为囊型和泡型两种类型。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_1543", "name": "棘球绦虫分类", "category": "微生物", "definition": "基于线粒体基因组序列分析，公认有9种棘球绦虫，包括细粒棘球绦虫狭义种、多房棘球绦虫等。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_1546", "name": "细粒棘球绦虫", "category": "微生物", "definition": "寄生于犬、狼等动物小肠内的绦虫，虫体长3-6mm，由头节、颈节、幼节和孕节组成。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_1547", "name": "棘球蚴生活史", "category": "生理机制", "definition": "虫卵被中间宿主摄入后孵化成六钩蚴，经血流进入肝脏发育为棘球蚴；终宿主吞食含棘球蚴的内脏后发育为成虫。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.95, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_1548", "name": "棘球蚴囊壁结构", "category": "解剖结构", "definition": "由内层生发层和外层角质层组成，生发层可芽生出生发囊、子囊和原头蚴。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.9, "color": "#14b8a6", "size": 8}, {"id": "book_06_传染病学_node_1550", "name": "终宿主与中间宿主", "category": "核心概念", "definition": "终宿主为犬、狼等动物，中间宿主为羊、牛、骆驼及人，人因摄入虫卵成为中间宿主。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_1551", "name": "虫卵抵抗力", "category": "微生物", "definition": "虫卵对外界抵抗力较强，室温水中可存活7-16天，干燥环境可存活11-12天，不易被化学消毒剂杀死。", "chapter": "第五节 棘球蚴病", "textbook": "传染病学", "confidence": 0.85, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_1555", "name": "婴幼儿轮状病毒性胃肠 _1741", "name": "流感流行特征", "category": "临床表现", "definition": "流行突然发生，发病率高，流行过程持续时间短，温带地区多发生于冬春季，热带地区多在夏季。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1742", "name": "流感发病机制", "category": "病理变化", "definition": "病毒通过血凝素与呼吸道上皮细胞表面受体结合，经内吞作用进入细胞，在细胞核内复制，导致细胞变性坏死和脱落，引发局部炎症和全身毒性反应。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_1743", "name": "流感病理改变", "category": "病理变化", "definition": "呼吸道纤毛上皮细胞簇状脱落、上皮细胞化生、固有层黏膜细胞充血水肿伴单核细胞浸润，重症可合并肺炎、弥漫性肺泡损害、脑病或心肌炎。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_1744", "name": "流感临床表现分型", "category": "临床表现", "definition": "典型流感起病急，潜伏期1-3天，临床分为单纯型、胃肠型和中毒型四种。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_1748", "name": "β3整合素", "category": "核心概念", "definition": "汉坦病毒的主要受体，存在于血管内皮细胞、血小板和巨噬细胞表面，介导病毒进入细胞，是致病性HV感染的关键。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_1749", "name": "血管内皮细胞", "category": "解剖结构", "definition": "汉坦病毒的主要靶细胞，其广泛损伤是导致全身小血管和毛细血管损伤、微血管损伤等临床表现的主要原因。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#14b8a6", "size": 8}, {"id": "book_06_传染病学_node_1756", "name": "疫源地类型", "category": "核心概念", "definition": "根据主要宿主动物和流行特征分为姬鼠型（秋冬季高峰）、家鼠型（春季高峰）和混合型（冬春季双峰），具有明显地区性和季节性。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_1757", "name": "病毒直接作用", "category": "病理变化", "definition": "汉坦病毒直接感染血管内皮细胞等靶细胞，导致微血管损伤、血小板减少及肾脏损害等主要临床特征。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_1758", "name": "流脑流行病学史", "category": "核心概念", "definition": "冬春季节发病（2～4月为流行高峰），1周内有流脑患者密切接触史，当地有本病发生或流行，既往 }, {"id": "book_06_传染病学_node_2134", "name": "HCV基因异质性与准种", "category": "核心概念", "definition": "HCV基因组变异程度大，5'非编码区最保守，E2/NS1区变异最大；感染者体内存在以优势株为主的准种病毒群。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2135", "name": "HCV基因型与地区分布", "category": "核心概念", "definition": "HCV分为11个基因型，1型最常见呈世界性分布，1b型RNA载量高，3型多见于印度，4型在中东及非洲，5型在南非。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2136", "name": "抗-HCV检测", "category": "临床表现", "definition": "抗-HCV不是保护性抗体，而是感染标志；IgM型提示持续复制易转为慢性，IgG型可长期存在。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2137", "name": "HCV RNA检测", "category": "临床表现", "definition": "感染后第1周即可用RT-PCR检出HCV RNA，阳性是病毒复制直接标志，定量检测有助于评估疗效和病毒载量。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2138", "name": "丁型肝炎病毒(HDV)特性", "category": "微生物", "definition": "HDV为缺陷病毒，需HBV辅助才能包装和表达抗原，基因组为单股环状负链RNA，具有核糖酶活性。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2139", "name": "HDV感染方式", "category": "病理变化", "definition": "HDV可与HBV同时感染（共感染）或在HBV感染基础上重叠感染，后者更常见。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2140", "name": "HBV与HDV的辅助关系", "category": "生理机制", "definition": "HDV在血液中需HBsAg包裹才能形成完整病毒，但细胞核内HDV RNA可自行复制，无需HBV辅助。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_2143", "name": "关节损害", "category": "临床表现", "definition": "败血症常见症状，多见于革兰氏阳性球菌和产碱杆菌败血症，表现为膝关节等大关节红肿，少数有积液或积脓。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2145", "name": "原发病灶", "category": "病理变化", "definition": "败血症的 ence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2155", "name": "H7N9禽流感病毒", "category": "微生物", "definition": "一种新型三重重配体甲型流感病毒，属于正黏病毒科，球形直径80-120nm，有包膜，可感染人类并引起严重呼吸道疾病。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2156", "name": "三源重配病毒", "category": "核心概念", "definition": "H7N9病毒的HA和NA片段分别来自浙江鸭H7N3和韩国野鸟H7N9，其余六个片段来自H9N2病毒，是一种新型重配禽流感病毒。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2157", "name": "受体结合位点突变", "category": "病理变化", "definition": "H7N9病毒HA蛋白的G186V及Q226L等突变，增强了病毒与人上呼吸道上皮细胞SAα-2,6Gal受体的结合能力，促进禽传人。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2158", "name": "PB2片段突变", "category": "病理变化", "definition": "H7N9病毒PB2片段出现E627K、K526R等突变，使病毒在人体内更有效地复制和生长。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2162", "name": "季节性流行特征", "category": "临床表现", "definition": "H7N9疫情主要发生在冬春季，地区分布从东部向南部再向北部发展，主要聚集在长三角和珠江三角洲地区。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2164", "name": "肺炎及急性呼吸窘迫综合征", "category": "临床表现", "definition": "H7N9感染的主要临床表现，常快速进展为急性呼吸窘迫综合征、感染性休克和多器官功能障碍综合征。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2165", "name": "弥漫性肺泡损伤", "category": "病理变化", "definition": "肺部病理表现为弥漫性肺泡上皮损伤，伴肺泡内出血、透明膜形成，晚期可见纤维组织增生。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2166", "name": "病毒受体结合机制", "category": "生理机制", "definition": "H7N9病毒可同时结合唾液酸α-2,3和α-2,6受体，易于入侵下呼吸道黏膜上皮细胞及Ⅱ型肺泡上皮细胞，HA蛋白裂解是感染先决条件。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_no olor": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2272", "name": "HEV流行特征", "category": "临床表现", "definition": "隐性感染多见，显性感染主要见于成年，原有慢性HBV感染者或晚期孕妇感染后病死率高，有春冬季高峰。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2273", "name": "HBV医源性传播", "category": "病理变化", "definition": "通过血液、共用剃刀和牙刷、器官移植等传播，随着一次性注射用品普及已明显下降。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2274", "name": "HCV输血传播", "category": "病理变化", "definition": "曾是最主要传播途径，输血后肝炎70%以上是丙型肝炎，随着筛查方法改进已得到控制。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2278", "name": "预后影响因素", "category": "病理变化", "definition": "影响重症患者预后的因素，包括年龄>65岁、有基础疾病、免疫抑制状态、妊娠、抗病毒治疗是否及时、有无并发症等。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2279", "name": "隔离治疗", "category": "治疗方法", "definition": "对疑似和确诊患者进行隔离，以防止病毒传播，是控制疫情的关键措施。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2280", "name": "氧疗", "category": "治疗方法", "definition": "根据缺氧程度采用鼻导管、普通面罩及储氧面罩进行氧气治疗，改善低氧血症。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2284", "name": "影像学表现", "category": "临床表现", "definition": "H7N9患者肺部影像学特征，包括磨玻璃样改变、肺实变、支气管充气征、网格样改变等，随病程进展变化。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2287", "name": "登革热", "category": "核心概念", "definition": "由登革病毒经埃及伊蚊或白纹伊蚊传播的自然疫源性传染病，以高热、皮疹、关节疼痛等为特征。", "chapter": "第三章 病毒性疾病 第十三节 登革热", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2288", "name": "登革病毒", "category": "微生物", "definition": "属于黄病毒科黄病毒属，单股正链RNA病毒，有4个血清型，球形，直径45-55nm，具有包膜。", "chapter": "第三章 病毒性疾 _2327", "name": "免疫清除期", "category": "病理变化", "definition": "HBV DNA、HBsAg和HBeAg阳性，ALT持续或反复升高，肝组织有明显炎症坏死和/或纤维化。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2328", "name": "免疫控制期", "category": "病理变化", "definition": "HBsAg水平低，HBeAg阴性，HBV DNA检测不到，ALT正常，肝细胞无或仅有轻微炎症。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2329", "name": "再活动期", "category": "病理变化", "definition": "免疫控制期后部分患者出现自发或免疫抑制导致的HBV DNA复制，伴或不伴HBeAg血清转换，HBV DNA载量升高和ALT持续或反复异常。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2330", "name": "HBV进入肝细胞的受体", "category": "发病机制", "definition": "HBV通过肝细胞膜上的钠离子-牛磺胆酸-协同转运蛋白（NTCP）作为受体进入肝细胞。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2331", "name": "cccDNA", "category": "核心概念", "definition": "HBV DNA进入细胞核后形成的共价闭合环状DNA，难以彻底清除，是导致慢性感染的重要机制之一。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2332", "name": "HBV复制过程", "category": "发病机制", "definition": "以cccDNA为模板合成前基因组mRNA，进入胞质作为模板合成负链DNA，再以负链为模板合成正链DNA，形成完整HBV DNA。前基因组RNA可释放入血清。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2333", "name": "乙型肝炎免疫应答与肝损伤", "category": "发病机制", "definition": "肝细胞病变主要取决于机体的免疫应答，尤其是细胞免疫。免疫应答既可清除病毒，也可导致肝细胞损伤，甚至诱导病毒变异。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2334", "name": "HAV抗原性与免疫反应", "category": "发病机制", "definition": "HAV抗原性较强，能激活特异性CD8+T淋巴细胞，通过直接作用和分泌细胞因子使肝细胞变性、坏死。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2335", "name": "HBV感染影响因素", "category": "核心概念", "definition": "影响HBV _node_2348", "name": "登革病毒（DENV）", "category": "微生物", "definition": "属于黄病毒科黄病毒属，有4个血清型，通过伊蚊传播，具有嗜免疫细胞和血管内皮细胞特性。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2349", "name": "埃及伊蚊和白纹伊蚊", "category": "解剖结构", "definition": "登革热的主要传播媒介昆虫，埃及伊蚊主要分布在沿海地区，白纹伊蚊分布更广，两者通过叮咬传播病毒。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#14b8a6", "size": 8}, {"id": "book_06_传染病学_node_2352", "name": "地理分布与季节性", "category": "临床表现", "definition": "登革热分布于热带和亚热带地区，有明显季节性，流行时间与伊蚊消长一致，多发生于气温高、多雨季节。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.93, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2354", "name": "病毒嗜性", "category": "病理变化", "definition": "DENV具有嗜免疫细胞、内皮细胞特性和组织泛嗜性，首先感染朗格汉斯细胞，然后感染单核巨噬细胞和血管内皮细胞。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.91, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2356", "name": "抗体依赖性增强感染作用（ADE）", "category": "病理变化", "definition": "二次感染不同型别DENV时，增强型抗体与病毒形成复合物，通过Fc受体增强病毒对单核细胞的吸附和感染，导致重症。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.89, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2358", "name": "流行形式与趋势", "category": "临床表现", "definition": "登革热全球分布，常呈地方性流行，近年流行范围扩大，发病率上升，我国发病率也呈上升趋势，4个血清型均已发现。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.87, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2361", "name": "不合理使用抗菌药物", "category": "病理变化", "definition": "在医疗和畜牧业中无指征、选药不当、用法错误等使用抗菌药物的行为，导致耐药菌产生。", "chapter": "第二章 新发感染病", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2363", "name": "超级细菌", "category": "微生物", "definition": "对现有抗菌药物全部耐药的细菌，由不合理使用抗菌药物在选择性压力下催生。", "chapter": "第二章 新发感染病", "textbook": "传染病学", "confidence": 0.88, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2365", "name": "人类生活方式改变", "category": "核心概念", "definition": "如国际旅行、贸易全球化、饮食习惯变化等，增加感染病传播风险。", "chapter": "第二章 新发感染病", ": "book_06_传染病学_node_2546", "name": "重症登革热防治出血", "category": "治疗方法", "definition": "局部止血、抑酸药物、避免侵入性操作，血红蛋白<7g/L时输注红细胞，血小板<30×10^9/L且出血时输注血小板。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2547", "name": "重症登革热维护器官功能", "category": "治疗方法", "definition": "脑型用甘露醇和呋塞米降颅压，呼吸抑制用辅助通气，肾衰竭和肝衰竭用血液净化。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2548", "name": "登革热预防措施", "category": "治疗方法", "definition": "包括疫情监测、防蚊隔离感染者、切断传播途径（灭蚊防蚊）、国境卫生检疫及疫苗研发。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2549", "name": "伊蚊", "category": "微生物", "definition": "登革热的传播媒介和非流行期间的储存宿主，灭蚊防蚊是预防登革热的根本措施。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2550", "name": "登革热疫苗", "category": "治疗方法", "definition": "正在研究的疫苗类型包括减毒活疫苗、重组亚单位疫苗和核酸疫苗等。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2551", "name": "NF-κB转录因子", "category": "核心概念", "definition": "一种关键的转录因子，在休克等应激状态下被激活，启动炎症反应蛋白（如IL-8）的合成与分泌，是炎症反应的核心调控因子。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2552", "name": "休克时的代谢改变", "category": "病理变化", "definition": "休克应激下，机体出现糖原和脂肪代谢亢进、胰岛素分泌减少、胰高糖素增多等代谢紊乱，导致ATP生成减少、乳酸堆积和酸中毒。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2553", "name": "休克时的酸中毒", "category": "病理变化", "definition": "休克过程中，早期因呼吸增快导致呼吸性碱中毒，后期因器官缺氧和ATP生成不足导致混合性酸中毒（乳酸酸中毒为主）。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2554", "name": "细胞膜钠泵功能障碍", "category": "病理变化", "definition": "休克时ATP生成不足，导致细胞膜上钠泵（Na+/K+-ATP酶）运转失灵，引起细胞内钠离子增多、细胞水肿，以及钙离子内流和钙超载。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.88, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2555", "name": "钙超载与磷脂酶激活", "category": "病理变化", "definition": "休克时细胞内钙离子浓度异常升高（钙超载），激活磷脂酶，水解细胞膜磷脂，产生花生四烯酸，进而生成前列腺素、血栓素A2和白三烯等炎症介质。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2556", "name": "休克时肺的病理变化", "category": "病理变化", "definition": "休克导致肺微循环灌注不足，肺泡表面活性物质减少，肺萎陷；若发生DIC，则出现微血栓、肺泡透明膜形成和肺实变。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.93, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2557", "name": "休克时心的病理变化", "category": "病理变化", "definition": "休克导致心肌纤维变性、坏死或断裂，心肌收缩力减弱，冠状动脉灌注不足，肌质网摄钙能力下降，Na+-K+-ATP酶失活，影响心功能。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2558", "name": "休克时肾的病理变化", "category": "病理变化", "definition": "休克早期肾小动脉收缩导致肾灌注减少，出现少尿；持续休克可致肾小管坏死、肾衰竭；并发DIC时肾小球血管丛血栓形成，导致肾皮质坏死。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.93, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2559", "name": "休克时脑的病理变化", "category": "病理变化", "definition": "休克时脑灌注不足，星形细胞肿胀压迫血管，血管内皮细胞肿胀，造成微循环障碍和脑缺氧，引起脑水肿。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.91, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2560", "name": "休克时肝和胃肠的病理变化", "category": "病理变化", "definition": "休克导致肝脏缺氧，肝细胞变性、坏死，糖原耗竭；胃肠黏膜微循环障碍，可形成溃疡。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2562", "name": "SOFA评分", "category": "临床表现", "definition": "序贯器官衰竭评分，用于评估脓毒症患者器官功能障碍的严重程度，评分较基线上升≥2分可诊断为脓毒症。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.94, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2563", "name": "qSOFA评分", "category": "临床表现", "definition": "床旁快速SOFA评分，用于快速识别重症脓毒症患者，若符合至少2项标准（如意识改变、收缩压≤100mmHg、呼吸频率≥22次/分），应进一步评 : "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2688", "name": "感染性休克的诊断条件", "category": "核心概念", "definition": "必须具备感染和休克综合征两个条件，感染灶包括皮肤、伤口、上呼吸道等，休克表现为低血压、意识不清、多器官功能损害。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2689", "name": "血乳酸水平监测", "category": "治疗方法", "definition": "动态监测血乳酸水平，用于评估患者组织缺氧程度及预后，休克早期动脉血pH偏高、PCO2不变，晚期转为pH偏低、PCO2降低、BE负值增大。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2690", "name": "急性肾衰竭鉴别诊断", "category": "病理变化", "definition": "通过尿比重、尿/血肌酐比值、尿渗透压、尿钠排泄量等指标，鉴别肾前性肾功能不全与急性肾衰竭，如尿比重固定、尿/血肌酐比值＜15等。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2691", "name": "乙型肝炎病毒（HBV）慢性肝炎机制", "category": "病理变化", "definition": "在机体免疫功能低下、不完全免疫耐受、自身免疫反应或病毒突变逃逸免疫清除时，HBV感染可转为慢性肝炎。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2692", "name": "HBV肝衰竭的“三重打击”机制", "category": "病理变化", "definition": "肝衰竭由免疫损伤（抗原抗体复合物激活补体释放炎症因子）、缺血/缺氧（肝细胞肿胀血管改变）、内毒素损伤（胆道及肺部感染释放内毒素）三重因素共同导致。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2693", "name": "HBV肝外损伤的免疫复合物机制", "category": "病理变化", "definition": "循环免疫复合物沉积在血管壁、关节滑膜或肾小球基底膜，激活补体，引起血清病样表现、膜性肾小球肾炎或结节性多动脉炎。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2694", "name": "HBV与肝细胞癌（HCC）的关系", "category": "病理变化", "definition": "HBV DNA整合入肝细胞染色体启动癌变，X蛋白和截断前S2/S多肽反式激活促进因子，激活原癌基因（如N-ras）并抑制抑癌基因（如p53），多在肝硬化基础上发生。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2695", "name": "丙型肝炎病毒（HCV）慢性化率", "category": "临床表现", "definition": "急性HCV感染后慢性化率为60%～85%，女性尤其是年轻女性慢性化率较低，自发痊愈罕见。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2696", "name": "HCV感染的自然史", "category": "临床表现", "definition": "急性期症状隐匿，慢性感染后HCV RNA滴度稳定，感染17～20年后2%～4%发展为肝硬化，30年后HCC发生率1%～3%，肝硬化后肝癌年发生率1%～7%。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2697", "name": "HCV致肝细胞损伤机制", "category": "病理变化", "definition": "包括HCV直接杀伤（干扰细胞合成、增加溶酶体通透性、表达产物毒性）、宿主免疫（CTL攻击、细胞因子损伤）、自身免疫（自身抗体产生）和细胞凋亡（Fas/FasL结合诱导凋亡）。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2698", "name": "HCV慢性化机制", "category": "病理变化", "definition": "包括HCV高度变异性（RNA聚合酶缺乏校正功能导致准种逃逸免疫）、对肝外细胞泛嗜性（外周血单核细胞中病毒反复感染肝细胞）、血液中滴度低免疫原性弱导致免疫耐受。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2699", "name": "HCV与肝细胞癌（HCC）的关系", "category": "病理变化", "definition": "HCV不整合入肝细胞染色体，但与HCC关系密切，主要发生在肝硬化和进展性肝纤维化患者中。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2700", "name": "HCV感染的实验室检测", "category": "临床表现", "definition": "感染第1周可用PCR检出HCV RNA，第2周开始可检出抗-HCV，少数病例3个月后才检出抗体。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2703", "name": "内氏小体", "category": "病理变化", "definition": "狂犬病毒在脑组织细胞中形成的包涵体，通过脑组织切片染色镜检可发现，阳性率70%-80%。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.92, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2704", "name": "免疫荧光法检测抗原", "category": "治疗方法", "definition": "用于检测狂犬病毒抗原的方法，阳性率可达98%，是确诊狂犬病的重要手段之一。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2706", "name": "核酸测定", "category": "治疗方法", "definition": "取新鲜唾液和皮肤活检组织行RT-PCR法测定狂犬病毒RNA，用于确诊和评估疫苗免疫。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2708", "name": "狂犬病诊断", "category": "临床表现", "definition": "依据被咬伤史、典型症状（流涎、感觉异常等）可临床诊断，确诊需病毒抗原、核酸或内氏小体检查。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2709", "name": "狂犬病鉴别诊断", "category": "临床表现", "definition": "需与破伤风、病毒性脑膜脑炎、脊髓灰质炎等疾病进行鉴别。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2710", "name": "狂犬病治疗", "category": "治疗方法", "definition": "以对症支持治疗为主，包括单室隔离、保持安静、加强监护、气管切开、纠正酸中毒和心律失常等。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.93, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2711", "name": "暴露后伤口处理", "category": "治疗方法", "definition": "用肥皂水或弱碱性清洁剂和流动清水交替冲洗伤口15分钟，消毒后一般不缝合，并注射免疫球蛋白。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.94, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2715", "name": "副伤寒甲", "category": "临床表现", "definition": "由甲型副伤寒沙门菌引起，分布较局限，潜伏期短，起病常有急性胃肠炎症状，热程约3周，复发率较高。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2716", "name": "副伤寒乙", "category": "临床表现", "definition": "由乙型副伤寒沙门菌引起，呈世界性分布，潜伏期短，热程约2周，肠道病变表浅可波及结肠。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2717", "name": "副伤寒丙", "category": "临床表现", "definition": "由丙型副伤寒沙门菌引起，临床表现复杂，可表现为脓毒血症型、伤寒型或急性胃肠炎型，以脓毒血症型多见，易形成迁徙性化脓灶。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2718", "name": "副伤寒沙门菌", "category": "微生物", "definition": "引起副伤寒的病原体，包括甲、乙、丙三种类型，属于沙门菌属。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2719", "name": "急性胃肠炎症状", "category": "临床表现", "definition": "副伤寒甲、乙起病时常见的表现，包括腹痛、呕吐等，持续2-3天后减轻，随后出现伤寒样症状。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2720", "name": "脓毒血症型", "category": "临床表现", "definition": "副伤寒丙最常见的临床表现，起病体温迅速上升，热型不规则，热程1-3周，易出现迁徙性化脓灶。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2721", "name": "迁徙性化脓灶", "category": "病理变化", "definition": "副伤寒丙患者脓毒血症时，细菌播散至身体其他部位形成的局部化脓性病灶，常见于关节等部位。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.8, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2722", "name": "副伤寒治疗", "category": "治疗方法", "definition": "副伤寒的治疗原则与伤寒相同，主要使用抗菌药物；副伤寒丙出现脓肿时需外科手术排脓并加强抗菌治疗。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2723", "name": "伤寒疫苗", "category": "治疗方法", "definition": "用于预防伤寒的疫苗，包括Ty21a活疫苗等，仅有部分免疫保护作用，免疫期约1年，需每年加强。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2725", "name": "脓毒症", "category": "核心概念", "definition": "感染或疑似感染患者，SOFA评分较基线上升≥2分时可诊断的器官功能障碍综合征。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.97, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2726", "name": "休克综合征", "category": "临床表现", "definition": "临床上出现血压下降、皮肤湿冷或花斑、唇指发绀、烦躁不安或意识障碍等表现的临床综合征。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2727", "name": "休克早期征象", "category": "临床表现", "definition": "预示休克发生的早期表现，包括体温骤升骤降、神志改变、皮肤与甲皱微循环改变、血压变化等。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2728", "name": "qSOFA标准", "category": "治疗方法", "definition": "快速序贯器官衰竭评分，用于识别重症脓毒症患者，包括意识改变、呼吸频率≥22次/分、收缩压≤100mmHg三项指标。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.94, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2731", "name": "SIRS（全身炎症反应综合征）", "category": "核心概念", "definition": "感染或非感染因素引起的全身性炎症反应，是感染性休克诊断中必须涉及的概念。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2732", "name": "感染性休克鉴别诊断", "category": "治疗方法", "definition": "早期需与导致SIRS的非感染性疾病（如重症急性胰腺炎、重症自身免疫性疾病）鉴别，中晚期需与其他类型休克鉴别。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.91, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2733", "name": "微循环灌流不足", "category": "病理变化", "definition": "休克时外周血管收缩、甲皱毛细血管减少、血流迟缓导致的组织灌注障碍，表现为皮肤苍白湿冷、花斑等。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.94, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2735", "name": "新冠病毒感染发病机制", "category": "发病机制", "definition": "SARS-CoV-2通过刺突蛋白识别ACE2受体，经TMPRSS2切割后进入宿主细胞，同时机体过度免疫反应也参与致病。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2736", "name": "ACE2受体", "category": "解剖结构", "definition": "血管紧张素转化酶2，位于宿主细胞表面，是SARS-CoV-2刺突蛋白的主要结合靶点。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#14b8a6", "size": 8}, {"id": "book_06_传染病学_node_2737", "name": "TMPRSS2", "category": "生理机制", "definition": "跨膜丝氨酸蛋白酶2，切割ACE2并活化刺突蛋白，促进病毒进入宿主细胞。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.97, "color": "#22c55e", "size": 8}, {"id": "book_06_传染病学_node_2738", "name": "新冠病毒感染病理变化", "category": "病理变化", "definition": "肺脏呈弥漫性肺泡损伤、渗出性肺泡炎、透明膜形成、黏液栓、血管炎、血栓形成及出血性梗死等。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.94, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2739", "name": "新冠病毒感染临床表现", "category": "临床表现", "definition": "潜伏期1-14天，多为2-4天；以轻型和中型为主，表现为乏力、嗅觉味觉减退，重型可出现ARDS、多器官衰竭。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.96, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2740", "name": "新冠病毒核酸检测", "category": "治疗方法", "definition": "采用RT-PCR或高通量测序检测呼吸道标本中的新冠病毒核酸，是诊断的金标准。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.99,  "size": 8}, {"id": "book_06_传染病学_node_2801", "name": "血氨及其他毒性物质贮积", "category": "病理生理", "definition": "肝细胞坏死或门-腔静脉短路导致血氨、短链脂肪酸等有毒物质蓄积，是肝性脑病的主要原因。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2802", "name": "支链氨基酸/芳香氨基酸比例失调", "category": "病理生理", "definition": "肝衰竭时芳香氨基酸升高、支链氨基酸正常或减少，比例失衡参与肝性脑病发生。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2803", "name": "假性神经递质假说", "category": "病理生理", "definition": "肝衰竭时某些胺类物质不能被清除，通过血脑屏障取代正常神经递质，导致肝性脑病。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2804", "name": "肝性脑病诱因", "category": "临床表现", "definition": "包括大量利尿、消化道大出血、高蛋白饮食、大量放腹水等，可诱发或加重肝性脑病。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2805", "name": "凝血功能障碍", "category": "病理生理", "definition": "肝衰竭时凝血因子合成减少，肝硬化脾功能亢进致血小板减少，DIC消耗凝血因子和血小板，导致出血倾向。", "chapter": "第三章 病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#6b7280", "size": 8}, {"id": "book_06_传染病学_node_2812", "name": "三个90%防治目标", "category": "核心概念", "definition": "联合国艾滋病规划署提出的目标：90%感染者知晓状况，90%诊断者接受治疗，90%治疗者病毒抑制。", "chapter": "第十五节 艾滋病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_2813", "name": "HIV病毒结构", "category": "微生物", "definition": "HIV为球形颗粒，直径100-120nm，由核心和包膜组成，核心含衣壳蛋白、两条正链RNA及复制酶类。", "chapter": "第十五节 艾滋病", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2814", "name": "反转录病毒科", "category": "微生物", "definition": "HIV所属的病毒科，其特征是含有反转录酶，能将RNA转录为cDNA。", "chapter": "第十五节 艾滋病", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_2815", "name": "合并症与并发症", "category": "病理变化", "definition": "HIV相关和非相关的其他疾病，是影响艾滋病患者预后和生存质量的主要原因。", "chapter": "第十五节 艾滋病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2817", "name": "轻型", "category": "临床表现", "definition": "临床症状轻微，影像学未见肺炎表现的新型冠状病毒感染类型。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2818", "name": "中型", "category": "临床表现", "definition": "持续高热>3d和/或咳嗽，呼吸频率<30次/min，指氧饱和度>93%，影像学可见肺炎表现的新型冠状病毒感染类型。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2819", "name": "重型", "category": "临床表现", "definition": "出现气促、呼吸频率≥30次/min、指氧饱和度≤93%或PaO2/FiO2≤300mmHg等严重表现的新型冠状病毒感染类型。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2820", "name": "危重型", "category": "临床表现", "definition": "出现呼吸衰竭需机械通气、休克或合并其他器官功能衰竭需ICU监护的新型冠状病毒感染类型。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2822", "name": "奈玛特韦/利托那韦", "category": "治疗方法", "definition": "适用于发病5天以内的轻、中型且伴有重症高风险因素的成年患者的抗病毒药物，需注意肾功能调整剂量。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2823", "name": "阿兹夫定片", "category": "治疗方法", "definition": "用于治疗中型新冠病毒感染的成年患者的抗病毒药物，空腹整片吞服，疗程不超过14天。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2824", "name": "莫诺拉韦胶囊", "category": "治疗方法", "definition": "适用于发病5天以内的轻、中型且伴有重症高风险因素的成年患者的抗病毒药物，连续服用5天。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2826", "name": "急性呼吸窘迫综合征", "category": "病理变化", "definition": "新型冠状病毒感染可能进展的严重并发症，表现为呼吸衰竭和肺部弥漫性损伤。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2828", "name": "志贺菌毒素", "category": "核心概念", "definition": "志贺菌产生的内毒素和外毒素，内毒素引起发热、毒血症 "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2837", "name": "菌痢病理变化", "category": "病理变化", "definition": "主要发生于大肠，以乙状结肠与直肠为主。急性期典型病变为初期卡他性炎，随后出现假膜性炎和溃疡；基本病理为弥漫性纤维蛋白渗出性炎症。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2838", "name": "中毒型菌痢病理特点", "category": "病理变化", "definition": "肠道病变轻，突出病理改变为大脑及脑干水肿、神经细胞变性，部分病例肾上腺充血、皮质萎缩。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2839", "name": "慢性菌痢病理特点", "category": "病理变化", "definition": "肠黏膜水肿和肠壁增厚，溃疡不断形成和修复，导致瘢痕和息肉形成，少数出现肠腔狭窄。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2840", "name": "低分子右旋糖酐", "category": "治疗方法", "definition": "分子量2-4万，可防止红细胞、血小板聚集，抗血栓形成，提高血浆胶体渗透压，扩充血容量，降低血液黏稠度，防止DIC，有渗透性利尿作用。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2841", "name": "平衡晶体液", "category": "治疗方法", "definition": "如碳酸氢钠或乳酸钠林格液，离子浓度接近生理水平，可提高功能性细胞外液容量，纠正酸中毒，对肝功能损害者宜用前者。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2842", "name": "葡萄糖液", "category": "治疗方法", "definition": "5%-10%葡萄糖液供给水分和能量，25%-50%有短暂扩容和渗透性利尿作用，休克早期不宜应用。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2843", "name": "扩容治疗原则", "category": "治疗方法", "definition": "输液先快后慢，短时间内逆转休克；监测CVP或肺动脉楔压，组织灌注良好、收缩压>90mmHg、脉压>30mmHg、脉率<120次/min、尿量>0.5ml/h、血红蛋白恢复至基础水平。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2844", "name": "纠正酸中毒", "category": "治疗方法", "definition": "使用5%碳酸氢钠，首剂100-250ml，动脉血pH<7.0时使用，需复查血气分析，同时改善微循环灌注。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2845", "name": "血管活性药物", "category": "治疗方法", "definition": "用于危及生命的低血压状态，维持最低灌注压和血流量，包括缩血管药物和扩血管药物。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2846", "name": "去甲肾上腺素", "category": "治疗方法", "definition": "感染性休克首选血管加压药，通过增加血管阻力升高MAP，对心脏指数影响小，剂量0.25-0.50μg/kg/min。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2847", "name": "多巴胺", "category": "治疗方法", "definition": "通过增加心脏指数升高MAP，对血管阻力影响小，用量5-20μg/kg/min，避免用于心动过速患者。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2848", "name": "多巴酚丁胺", "category": "治疗方法", "definition": "适用于低排高阻型休克，在充分扩容后使用，用于持续低灌注患者。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2849", "name": "酚妥拉明", "category": "治疗方法", "definition": "α受体阻滞剂，解除微血管痉挛和微循环淤滞，防止肺水肿，作用快而短，不宜用于心肌梗死、心力衰竭患者。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_2851", "name": "肝肺综合征", "category": "病理变化", "definition": "肝衰竭和肝硬化患者出现的肺水肿、间质性肺炎、盘状肺不张、胸腔积液和低氧血症等改变，表现为低氧血症和高动力循环症。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2853", "name": "腹水形成机制", "category": "病理变化", "definition": "肝衰竭和肝硬化时，早期腹水主要由钠潴留引起；后期腹水由门静脉高压、低蛋白血症和肝淋巴液生成增多共同导致。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_2854", "name": "病毒性肝炎潜伏期", "category": "临床表现", "definition": "不同类型病毒引起的肝炎潜伏期不同：甲肝2-6周，乙肝1-6个月，丙肝2周-6个月，丁肝4-20周，戊肝2-9周。", "chapter": "第三章  病毒性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_2855", "name": "急性黄疸型肝炎", "category": "临床表现", "definition": "急性肝炎的一种 : "治疗方法", "definition": "取血、脑脊液或尿离心后沉淀，直接或镀银染色后镜检，阳性率约50%，有助于早期诊断。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3351", "name": "神经型食物中毒（肉毒中毒）", "category": "核心概念", "definition": "由进食含有肉毒杆菌外毒素的食物引起的中毒性疾病，以中枢神经系统症状如眼肌及咽肌瘫痪为主要表现。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3353", "name": "肉毒杆菌外毒素", "category": "核心概念", "definition": "肉毒杆菌产生的嗜神经毒素，对人的致死量仅为0.01mg左右，对胃酸有抵抗力但不耐热。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3354", "name": "肉毒杆菌血清型", "category": "微生物", "definition": "按抗原性不同，肉毒杆菌可分A、B、C、D、E、F、G 8种血清型，致病者以A、B、E 3型为主。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_3355", "name": "肉毒杆菌芽孢", "category": "微生物", "definition": "肉毒杆菌的休眠形式，广泛存在于土壤或海水中，抵抗力极强，需高压灭菌120℃ 20分钟才可灭活。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_3356", "name": "肉毒中毒的流行病学", "category": "病理变化", "definition": "通过进食被肉毒杆菌外毒素污染的食物传播，常见于变质肉食品、豆制品及罐头食品，人群普遍易感。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_3357", "name": "肉毒中毒的发病机制", "category": "病理变化", "definition": "肉毒毒素吸收入血后，作用于脑神经核、肌肉接头处及自主神经末梢，抑制胆碱能神经释放，导致肌肉麻痹。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#f59e0b", "size": 8}, {"id": "book_06_传染病学_node_3358", "name": "肉毒中毒的临床表现", "category": "临床表现", "definition": "以中枢神经系统症状为主，如眼肌及咽肌瘫痪，可危及生命，抢救不及时病死率较高。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3359", "name": "肉毒中毒的治疗", "category": "治疗方法", "definition": "维持电解质平衡并抗休克，一般不用抗菌药物，严重高热患者可按病原菌选用抗菌药物。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3360", "name": "食物中毒的防控措施", "category": "治疗方法", "definition": "包括立即报告卫生防疫部门、加强食品卫生管理、宣传教育、食物除菌、避免变质食物等。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3361", "name": "沙门菌/血弧菌感染的治疗", "category": "治疗方法", "definition": "成年患者可选用喹诺酮类抗菌药物，儿童患者可选用第三代头孢菌素治疗。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.85, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3362", "name": "围术期预防用药原则", "category": "治疗方法", "definition": "在手术前0.5-1小时或麻醉开始时给药，确保手术切口暴露时局部组织药物浓度足以杀灭污染细菌，总预防用药时间不超过24小时，特殊情况可延长至48小时。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3363", "name": "围术期预防用药时机", "category": "治疗方法", "definition": "术前0.5-1小时或麻醉开始时给药，若手术时间超过3小时或失血量>1500ml，术中可给予第2剂。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3364", "name": "围术期预防用药持续时间", "category": "治疗方法", "definition": "抗菌药物有效覆盖时间应包含整个手术过程和术后4小时，总预防用药时间不超过24小时，个别情况可延长至48小时。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3365", "name": "围术期预防用抗菌药物选择", "category": "治疗方法", "definition": "根据手术类型选择抗菌药物，如二代头孢菌素常用于多种手术，高发MRSA单位可用万古霉素，涉及厌氧菌感染时可加用甲硝唑。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3366", "name": "青霉素类抗菌药物", "category": "核心概念", "definition": "包括青霉素G、耐酶青霉素、氨基青霉素、抗假单胞菌青霉素等，具有不同抗菌谱，主要用于革兰氏阳性球菌、奈瑟菌属、梅毒、钩端螺旋体病、炭疽等感染。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3367", "name": "青霉素G", "category": "核心概念", "definition": "第一个被应用于临床的抗菌药物，主要用于革兰氏阳性球菌（除葡萄球菌外）和奈瑟菌属感染以及梅毒、钩端螺旋体病、炭疽等治疗。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3368", "name": "耐酶青霉素", "category": "核心概念", "definition": "包括苯唑西林、氟氯西林及双氯西林，对葡萄球菌产生的β-内酰胺酶稳定，对革兰氏阴性菌无抗菌作用，主要用于治疗产酶葡萄球菌感染。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3369", "name": "氨基青霉素", "category": "核心概念", "definition": "以氨苄西林与阿莫西林为代表，具有广谱抗菌活性，对革兰氏阳性菌作用逊于青霉素，但对流感嗜血杆菌、肠球菌及部分肠杆菌有抗菌作用，近年耐药率较高。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3370", "name": "抗假单胞菌青霉素", "category": "核心概念", "definition": "包括羧苄西林、阿洛西林等，具有抗假单胞菌活性，用于治疗假单胞菌感染。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3372", "name": "围术期预防用药注意事项", "category": "治疗方法", "definition": "青霉素类药物半衰期短，需注意用药时间间隔和频次，用药前需询问过敏史并进行皮试。", "chapter": "第十章 其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3375", "name": "黄疸出血型", "category": "临床表现", "definition": "钩体病的一种类型，需加强护肝、止血治疗，可参照病毒性肝炎治疗，肾衰竭时按急性肾衰竭处理。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.95, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3376", "name": "后发热、反应性脑膜炎", "category": "临床表现", "definition": "钩体病后发症，一般采取简单对症治疗，短期即可缓解。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3377", "name": "葡萄膜炎", "category": "临床表现", "definition": "钩体病后发症，可采用1%阿托品或10%去氧肾上腺素滴眼扩瞳，必要时用肾上腺糖皮质激素。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3378", "name": "闭塞性脑动脉炎", "category": "临床表现", "definition": "钩体病后发症，需大剂量青霉素联合肾上腺糖皮质激素治疗，辅以血管扩张药物。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3379", "name": "综合性预防措施", "category": "治疗方法", "definition": "控制钩体病流行和减少发病的关键，包括改善环境和预防接种。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3381", "name": "猪的管理", "category": "治疗方法", "definition": "钩体病预防措施之一，包括圈猪积肥、防止尿液污染水源、检疫及预防接种。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3382", "name": "犬的管理", "category": "治疗方法", "definition": "钩体病预防措施之一，需消灭野犬以切断传播途径。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3383", "name": "改造疫源地", "category": "治疗方法", "definition": "钩体病预防措施之一，包括开沟排水、放干积水、兴修水利防止洪水泛滥。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3384", "name": "环境卫生和消毒", "category": "治疗方法", "definition": "钩体病预防措施之一，对牲畜饲养场所、屠宰场等搞好环境卫生和消毒。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.9, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3385", "name": "注意防护", "category": "治疗方法", "definition": "钩体病预防措施之一，避免接触疫水，必要时穿长筒橡皮靴、戴胶皮手套。", "chapter": "第七章  螺旋体病", "textbook": "传染病学", "confidence": 0.95, "color": "#ec4899", "size": 8}, {"id": "book_06_传染病学_node_3388", "name": "头孢菌素分代", "category": "核心概念", "definition": "根据抗菌谱、对β-内酰胺酶稳定性及抗菌活性等药学特征，将头孢菌素分为第一代至第五代。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3389", "name": "第一代头孢菌素", "category": "核心概念", "definition": "对葡萄球菌（包括耐青霉素株）、大肠埃希菌等有较强活性，注射剂血药浓度高，适用于敏感菌所致较严重感染。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3390", "name": "第二代头孢菌素", "category": "核心概念", "definition": "抗菌谱较第一代广，对革兰氏阴性菌作用增强，但对部分肠杆菌科细菌敏感性差，铜绿假单胞菌基本耐药。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3392", "name": "第四代头孢菌素", "category": "核心概念", "definition": "对头孢菌素酶稳定，抗铜绿假单胞菌活性，抗革兰氏阳性菌活性较三代强，但对ESBL不稳定。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3393", "name": "第五代头孢菌素", "category": "核心概念", "definition": "具有抗MRSA活性的头孢菌素，如头孢比罗，代表最新一代头孢菌素。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3394", "name": "头霉素类", "category": "核心概念", "definition": "结构与头孢菌素相似，母核第7位碳有甲氧基侧链，对β-内酰胺酶稳定，抗菌谱与第二代头孢菌素相仿，对厌氧菌作用强。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3395", "name": "氧头孢烯类", "category": "核心概念", "definition": "具有第三代头孢菌素广谱、强效特点，对厌氧菌良好，对ESBL稳定，但拉氧头孢可能影响凝血功能。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3396", "name": "单环β-内酰胺类", "category": "核心概念", "definition": "窄谱抗菌药，对革兰氏阴性肠杆菌科细菌作用强，对β-内酰胺酶稳定，对革兰氏阳性菌和厌氧菌作用差。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3397", "name": "碳青霉烯类", "category": "核心概念", "definition": "抗菌谱极广，活性甚强，对需氧和厌氧菌均有抗菌作用，对β-内酰胺酶高度稳定，适用于严重感染和混合感染。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.95, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3398", "name": "ESBL（超广谱β-内酰胺酶）", "category": "微生物", "definition": "一种能水解第三代头孢菌素和单环β-内酰胺类等抗生素的酶，导致细菌耐药。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.9, "color": "#8b5cf6", "size": 8}, {"id": "book_06_传染病学_node_3399", "name": "双硫仑样反应", "category": "临床表现", "definition": "使用含四氮唑环结构的头霉素类药物后饮酒，可能引起面部潮红、头痛、恶心等不良反应。", "chapter": "第十章  其他感染相关问题", "textbook": "传染病学", "confidence": 0.85, "color": "#ef4444", "size": 8}, {"id": "book_06_传染病学_node_3401", "name": "肉毒毒素", "category": "核心概念", "definition": "肉毒杆菌产生的神经外毒素，阻断乙酰胆碱在神经肌肉接头的释放，导致肌肉松弛性瘫痪。", "chapter": "第五章  细菌性疾病", "textbook": "传染病学", "confidence": 0.98, "color": "#6366f1", "size": 8}, {"id": "book_06_传染病学_node_3402", "name": "神经肌肉接头阻断", "category": "生理机制", "definition": "   .attr("stroke", "none").attr("stroke-width", 2).style("cursor", "pointer");

node.append("text").text(d => d.name)
  .attr("dx", 14).attr("dy", 4).attr("font-size", "11px").attr("fill", "#8b949e")
  .style("pointer-events", "none");

const tooltip = d3.select("#tooltip");
node.on("click", (e, d) => {
  e.stopPropagation();
  tooltip.style("display", "block")
    .style("left", Math.min(e.clientX + 10, width - 340) + "px")
    .style("top", Math.min(e.clientY - 10, height - 200) + "px")
    .html("<h4>" + d.name + "</h4>"
      + (d.category ? '<span class="tag" style="background:' + catColor(d.category) + '">' + d.category + "</span>" : "")
      + (d.definition ? '<p class="def">' + d.definition + "</p>" : "")
      + '<div class="meta">' + (d.textbook ? "教材：" + d.textbook + "<br>" : "")
      + (d.chapter ? "章节：" + d.chapter + "<br>" : "")
      + (d.confidence ? "置信度：" + Math.round(d.confidence*100) + "%" : "") + "</div>");
});

svg.on("click", () => tooltip.style("display", "none"));

const sim = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(validLinks).id(d => d.id).distance(120))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide().radius(30));

sim.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform", d => "translate("+d.x+","+d.y+")");
});

// Legend
const legendDiv = d3.select("#legend");
categories.forEach(c => {
  legendDiv.append("div").attr("class","legend-item")
    .html('<div class="legend-color" style="background:'+catColor(c)+'"></div><span>'+c+'</span>');
});

// Stats
d3.select("#stats").html("节点：" + data.nodes.length + " | 关系：" + validLinks.length);
</script>
</body>
</html>
